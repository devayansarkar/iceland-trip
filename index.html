<!doctype html>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Iceland Expedition</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"

    <style>
      :root {
        --bg: #05070c;
        --card: #0f172a;
        --accent: #38bdf8;
        --text: #e5e7eb;
        --muted: #9ca3af;
        --border: #1f2937;
      }

      body {
        margin: 0;
        font-family: Inter;
        background: var(--bg);
        color: var(--text);
      }

      header {
        padding: 60px;
        text-align: center;
        background: url("https://images.unsplash.com/photo-1491466424936-e304919aada7?q=80&w=2069&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D")
          center/cover;
      }

      header h1 {
        margin: 0;
        font-size: 38px;
      }

      .container {
        max-width: 1000px;
        margin: auto;
        padding: 20px;
      }

      /* TODAY PANEL */

      .today {
        background: #020617;
        border: 2px solid var(--accent);
        padding: 20px;
        border-radius: 12px;
        margin-bottom: 30px;
      }

      .today h1 {
        font-size: 56px;
        margin: 10px 0;
        color: #38bdf8;
      }

      .today h2 {
        margin-top: 0;
      }

      /* DAY CARDS */

      .day {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        margin-bottom: 16px;
        overflow: hidden;
        transition: 0.3s;
      }

      .day.past {
        opacity: 0.45;
      }

      .day.today {
        border: 2px solid var(--accent);
      }

      .day-header {
        padding: 18px;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
      }

      .day-content {
        display: none;
        padding: 20px;
      }

      .image {
        height: 160px;
        background-size: cover;
        border-radius: 8px;
        margin-bottom: 14px;
      }

      .day-map {
        height: 240px;
        border-radius: 8px;
        margin-bottom: 18px;
      }

      /* TIMELINE */

      .stop {
        display: grid;
        grid-template-columns: 90px 1fr;
        gap: 15px;
        padding: 10px 0;
        border-left: 2px solid var(--border);
        margin-left: 10px;
        position: relative;
      }

      .stop:before {
        content: "";
        width: 10px;
        height: 10px;
        background: var(--accent);
        border-radius: 50%;
        position: absolute;
        left: -6px;
        top: 16px;
      }

      .time {
        color: var(--accent);
        font-size: 13px;
        margin-left: 10px;
        margin-top: 4px;
      }

      .notes {
        color: var(--muted);
        font-size: 14px;
      }

      .nav {
        font-size: 13px;
        margin-top: 4px;
      }

      .nav a {
        color: #22c55e;
        text-decoration: none;
      }

      footer {
        text-align: center;
        padding: 40px;
        color: var(--muted);
      }
    </style>
  </head>

      const diffTime = tripStart - today;
      const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

      if (today < tripStart) {
        todayPanel.innerHTML = `
<h2>🇮🇸 Trip Countdown</h2>
<h1>${diffDays} days</h1>
<p>until departure to Iceland</p>
`;
      } else if (todayDay) {
        todayPanel.innerHTML = `
<h2>📍 Today's Plan</h2>
<strong>${todayDay.title}</strong>
<ul>
${todayDay.stops.map((s) => `<li>${s.time} — ${s.place}</li>`).join("")}
</ul>
`;
      } else if (today > tripEnd) {
        todayPanel.innerHTML = `
<h2>Trip Completed</h2>
<p>Your Iceland adventure finished on July 26</p>
`;
      }

      /* RENDER DAYS */

      const container = document.getElementById("trip");

      days.forEach((d, i) => {
        const date = new Date(d.date);

        const div = document.createElement("div");
        div.className = "day";

        if (date < today) div.classList.add("past");
        if (d.date === todayStr) div.classList.add("today");

        div.innerHTML = `

<div class="day-header">

<div>
<strong>${date.toDateString()}</strong><br>
${d.title}
</div>

<div>▼</div>

</div>

<div class="day-content">

<div class="image" style="background-image:url('${d.image}')"></div>

<div id="map${i}" class="day-map"></div>

${d.stops
  .map(
    (s) => `

<div class="stop">

<div class="time">${s.time}</div>

<div>

<div>${s.place}</div>

<div class="nav">
<a href="https://www.google.com/maps/dir/?api=1&destination=${s.lat},${s.lon}" target="_blank">
Navigate
</a>
</div>

</div>

</div>

`,
  )
  .join("")}

</div>

`;

        container.appendChild(div);

        const header = div.querySelector(".day-header");
        const content = div.querySelector(".day-content");

        header.onclick = () => {
          content.style.display =
            content.style.display === "block" ? "none" : "block";

          if (!content.dataset.loaded) {
            const map = L.map(`map${i}`).setView(
              [d.stops[0].lat, d.stops[0].lon],
              8,
            );

            L.tileLayer(
              "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
            ).addTo(map);

            const coords = d.stops.map((s) => [s.lat, s.lon]);

            const route = L.polyline(coords, { color: "#38bdf8" }).addTo(map);

            coords.forEach((c) => L.marker(c).addTo(map));

            map.fitBounds(route.getBounds());

            content.dataset.loaded = true;
          }
        };
      });
